models:
  - name: fact_orders
    description: "Order-level fact table combining orders, payments, items, and reviews."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: total_payment_value
        tests:
          - not_null
  - name: src_orders
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null

        